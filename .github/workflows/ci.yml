name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      # npm ci fails if package.json and package-lock.json disagree,
      # which also blocks tampered dependency manifests.
      - name: Install dependencies
        run: npm ci

      # tsc --noEmit catches runtime crashes that esbuild's strip-types
      # build silently lets through (e.g. missing imports, prop typos).
      - name: Type check
        run: npx tsc --noEmit

      # A clean build blocks broken, corrupted, or injected code from
      # reaching main.
      - name: Build
        run: npm run build
